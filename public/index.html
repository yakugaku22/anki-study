<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>暗記シート</title>
<link rel="stylesheet" href="style.css" />

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  document.documentElement.classList.add("gate");
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><h1>暗記シート</h1><span id="subjName">—</span></div>
    <div class="hgroup">
      <div class="seg">
        <button id="mEdit" class="on" data-mode="edit">編集</button>
        <button id="mStudy" data-mode="study">暗記</button>
      </div>
      <div id="authArea"></div>
    </div>
  </header>

  <div class="searchbar">
    <span class="mag">🔍</span>
    <input id="searchInput" placeholder="書いた内容を検索（全科目・全分野）" />
    <button class="clr" id="searchClr" style="display:none">✕</button>
  </div>
  <div id="results"></div>

  <div id="browse">
    <div class="row-label">科目</div>
    <nav class="tabs subjects" id="subjectTabs"></nav>

    <div class="row-label">分野</div>
    <nav class="tabs cats" id="catTabs"></nav>

    <div class="bar" id="toolbar"></div>
    <main id="main"></main>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
