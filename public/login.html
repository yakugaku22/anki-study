<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ログイン｜暗記シート</title>
<style>
  :root{
    --paper:#F6F7F9; --card:#FFFFFF; --ink:#1C2530; --muted:#6B7684;
    --line:#E4E8EE; --teal:#0F766E; --teal-soft:#E7F1EF;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    width:100%; max-width:380px; padding:34px 26px 30px; text-align:center;
    box-shadow:0 10px 40px rgba(28,37,48,.06);
  }
  .logo{
    width:52px; height:52px; margin:0 auto 16px; border-radius:14px;
    background:var(--teal); color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:800;
  }
  h1{ font-size:20px; font-weight:800; margin:0 0 4px; letter-spacing:.02em; }
  .sub{ font-size:13px; color:var(--muted); margin:0 0 26px; line-height:1.7; }
  .gbtn{
    width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
    border:1px solid var(--line); background:#fff; color:var(--ink);
    font-family:inherit; font-weight:700; font-size:15px; padding:13px; border-radius:11px; cursor:pointer;
    transition:.12s;
  }
  .gbtn:hover{ border-color:var(--teal); box-shadow:0 2px 10px rgba(15,118,110,.10); }
  .gbtn:disabled{ opacity:.55; cursor:default; }
  .gicon{ width:20px; height:20px; flex:0 0 auto; }
  .msg{ margin-top:18px; font-size:13px; min-height:18px; }
  .msg.err{ color:#B4443A; }
  .msg.ok{ color:var(--teal); }
  .foot{ margin-top:22px; font-size:11px; color:var(--muted); line-height:1.7; }
  .spin{ display:inline-block; width:15px; height:15px; border:2px solid var(--teal-soft);
    border-top-color:var(--teal); border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .spin{ animation:none; } }
</style>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="card">
    <div class="logo">暗</div>
    <h1>暗記シート</h1>
    <p class="sub">ログインすると、覚えたい内容を保存して<br>どの端末からでも続きを勉強できます。</p>

    <button class="gbtn" id="gbtn" onclick="login()">
      <svg class="gicon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span id="gtext">Google でログイン</span>
    </button>

    <div class="msg" id="msg"></div>

    <div class="foot">初回はアカウントの選択画面が開きます。</div>
  </div>

<script>
/* ===== ① index.html と同じ firebaseConfig を貼ってください ===== */
const firebaseConfig = {
   apiKey: "AIzaSyDq93IcZIgKTTgKuMQOcyY9SQF-tPaNNY0",
  authDomain: "anki-study-143aa.firebaseapp.com",
  projectId: "anki-study-143aa",
  storageBucket: "anki-study-143aa.firebasestorage.app",
  messagingSenderId: "324035910852",
  appId: "1:324035910852:web:7a3819b145135f3790bd91",
  measurementId: "G-SD7QW8FPKD"
};
/* ============================================================ */

const msg = document.getElementById("msg");
const gbtn = document.getElementById("gbtn");
const gtext = document.getElementById("gtext");

function setBusy(on, text){
  gbtn.disabled = on;
  gtext.innerHTML = on ? '<span class="spin"></span>' + (text || "処理中…") : "Google でログイン";
}
function showErr(t){ msg.className = "msg err"; msg.textContent = t; }
function showOk(t){ msg.className = "msg ok"; msg.textContent = t; }

let ready = false;
try{
  if(!firebaseConfig.apiKey || firebaseConfig.apiKey === "ここに貼る"){
    showErr("firebaseConfig が未入力です。login.html に設定を貼ってください。");
  }else{
    firebase.initializeApp(firebaseConfig);
    ready = true;
    // すでにログイン済みならアプリ本体へ
    firebase.auth().onAuthStateChanged(function(user){
      if(user){ showOk("ログイン済みです。移動します…"); location.replace("index.html"); }
    });
    // リダイレクト方式で戻ってきた場合の結果を拾う
    firebase.auth().getRedirectResult().catch(function(e){
      if(e && e.code) showErr("ログインエラー: " + e.code);
    });
  }
}catch(e){ showErr("初期化エラー: " + (e.code || e.message)); }

function login(){
  if(!ready){ showErr("設定が未完了です。firebaseConfig を確認してください。"); return; }
  msg.textContent = ""; setBusy(true, "ログイン中…");
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(function(){ showOk("ログインしました。移動します…"); location.replace("index.html"); })
    .catch(function(err){
      // ポップアップがブロック/閉じられた・iOS等 → リダイレクト方式へ
      if(err.code === "auth/popup-blocked" || err.code === "auth/cancelled-popup-request" || err.code === "auth/operation-not-supported-in-this-environment"){
        firebase.auth().signInWithRedirect(provider);
      }else if(err.code === "auth/popup-closed-by-user"){
        setBusy(false); showErr("ログインがキャンセルされました。");
      }else{
        setBusy(false); showErr("ログインエラー: " + err.code);
      }
    });
}
</script>
</body>
</html>
